version: 2
updates:
  # GitHub-Actions-Versionen (gilt für ALLE Repos, auch ohne package.json).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"

  # NPM-Abhängigkeiten.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
    # Patch-/Minor-Updates gebündelt, damit nicht pro Paket ein PR aufgeht.
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
